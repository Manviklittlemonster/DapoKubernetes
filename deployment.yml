kind: Deployment
apiVersion: apps/v1
metadata:
  name: notes-deployment
  namespace: nginx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notes-app
  template:
    metadata:
      name: notes-pod
      labels:
        app: notes-app
    spec:
      containers:
      - name: nginx
        image: manviklittlemonster/dapo123:latest
        ports:
        - containerPort: 8000
      

